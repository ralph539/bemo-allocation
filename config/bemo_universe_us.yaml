# Bemo Europe - US-listed variant of the canonical universe. Same sleeve names,
# tiers, weights, caps and variants as config/bemo_universe.yaml, but each sleeve
# is mapped to the actual US-listed USD ETF instead of a EUR UCITS proxy, and the
# whole book is run in USD. Sleeve names are kept identical because the engine keys
# on them; the "EUR" text in a couple of names is a label only, not a currency here.
# fx: native = already quoted in the base currency (USD), no conversion.
base_currency: USD
start: "2008-01-01"

sleeves:
  - name: Equity - Europe (home)
    bucket: Equity
    proxy: IEUR
    quote_ccy: USD
    fx: native
    us_example: iShares Core MSCI Europe ETF (NYSE Arca, USD)
    weights: {conservative: 9, balanced: 14, growth: 18, aggressive: 20}

  - name: Equity - US
    bucket: Equity
    proxy: IVV
    quote_ccy: USD
    fx: native
    us_example: iShares Core S&P 500 ETF (NYSE Arca, USD)
    weights: {conservative: 10, balanced: 18, growth: 26, aggressive: 32}

  - name: Equity - Developed Asia-Pacific / Japan
    bucket: Equity
    proxy: EWJ
    quote_ccy: USD
    fx: native
    us_example: iShares MSCI Japan ETF (NYSE Arca, USD)
    weights: {conservative: 4, balanced: 8, growth: 12, aggressive: 13}

  - name: Equity - Emerging / Asia
    bucket: Equity
    proxy: IEMG
    quote_ccy: USD
    fx: native
    us_example: iShares Core MSCI Emerging Markets ETF (NYSE Arca, USD)
    weights: {conservative: 3, balanced: 8, growth: 9, aggressive: 11}

  - name: Equity - Thematic AI / automation
    bucket: Equity
    proxy: AIQ
    quote_ccy: USD
    fx: native
    us_example: Global X Artificial Intelligence & Technology ETF (Nasdaq, USD)
    weights: {conservative: 2, balanced: 4, growth: 5, aggressive: 6}

  - name: Fixed income - EUR Govt / core
    bucket: Fixed income
    proxy: GOVT
    quote_ccy: USD
    fx: native
    us_example: iShares U.S. Treasury Bond ETF (NYSE Arca, USD)
    weights: {conservative: 34, balanced: 15, growth: 9, aggressive: 3}

  - name: Fixed income - EUR IG credit
    bucket: Fixed income
    proxy: LQD
    quote_ccy: USD
    fx: native
    us_example: iShares iBoxx $ Investment Grade Corporate Bond ETF (NYSE Arca, USD)
    weights: {conservative: 12, balanced: 9, growth: 5, aggressive: 2}

  - name: Fixed income - Inflation-linked
    bucket: Fixed income
    proxy: TIP
    quote_ccy: USD
    fx: native
    us_example: iShares TIPS Bond ETF (NYSE Arca, USD)
    weights: {conservative: 6, balanced: 4, growth: 2, aggressive: 1}

  - name: Fixed income - High yield
    bucket: Fixed income
    proxy: HYG
    quote_ccy: USD
    fx: native
    us_example: iShares iBoxx $ High Yield Corporate Bond ETF (NYSE Arca, USD)
    weights: {conservative: 4, balanced: 3, growth: 1, aggressive: 0}

  - name: Fixed income - EM debt
    bucket: Fixed income
    proxy: EMB
    quote_ccy: USD
    fx: native
    us_example: iShares J.P. Morgan USD Emerging Markets Bond ETF (Nasdaq, USD)
    weights: {conservative: 4, balanced: 3, growth: 1, aggressive: 0}

  - name: Gold
    bucket: Alternatives
    proxy: GLD
    quote_ccy: USD
    fx: native
    us_example: SPDR Gold Shares (NYSE Arca, USD)
    weights: {conservative: 3, balanced: 4, growth: 4, aggressive: 5}

  - name: Liquid alternatives / hedge funds
    bucket: Alternatives
    proxy: DBMF
    quote_ccy: USD
    fx: native
    us_example: iMGP DBi Managed Futures Strategy ETF (NYSE Arca, USD)
    weights: {conservative: 3, balanced: 4, growth: 3, aggressive: 2}

  - name: Real assets / REITs / infrastructure
    bucket: Alternatives
    proxy: IGF
    quote_ccy: USD
    fx: native
    us_example: iShares Global Infrastructure ETF (Nasdaq, USD)
    weights: {conservative: 3, balanced: 4, growth: 3, aggressive: 3}

  - name: Private markets
    bucket: Alternatives
    proxy: null   # 0 in every tier; excluded from the data pull
    quote_ccy: null
    fx: none
    us_example: private / evergreen, large mandates only
    weights: {conservative: 0, balanced: 0, growth: 0, aggressive: 0}

  - name: Cash / EUR money market
    bucket: Cash
    proxy: BIL
    quote_ccy: USD
    fx: native
    us_example: SPDR Bloomberg 1-3 Month T-Bill ETF (NYSE Arca, USD)
    weights: {conservative: 3, balanced: 2, growth: 2, aggressive: 2}

# Caps and guardrails, identical to the EUR config.
caps:
  regulatory_ucits:
    diversification_5_10_40: "Max 10% NAV per issuer; sum of holdings >5% must not exceed 40% NAV. Govt/public exempt to 35% (or 100% across >=6 issues)."
    counterparty: "<=20% NAV deposits with one body; OTC-derivative counterparty <=10% (credit institution) / 5% (other)."
    eligible_assets: "Transferable securities, MMIs and eligible UCIs only. No direct physical commodities; gold via ETC (debt security)."
    liquidity: "Daily-liquid listed instruments; illiquid/private assets excluded from the UCITS wrapper."
  equity_band:   # equity share is the tier's primary cap
    conservative: [0, 30]
    balanced: [50, 55]
    growth: [68, 75]
    aggressive: [82, 92]
  em_equity_max_pct_of_equity: [10, 20]
  hy_plus_em_debt:
    lower_tiers_max: 8      # combined, ~6-8% in lower tiers
    aggressive_core: 0
  gold_pct: [3, 5]
  thematic_ai_max_pct_of_equity: [5, 10]
  private_markets_standard_model: 0
  tactical_band_pct: [5, 10]     # +/- drift per sleeve around strategic weight
  tail_risk: "Per-tier ceiling on 95% CVaR and max drawdown, enforced as an optimiser constraint."
  rebalancing: "Tolerance-band trigger plus a turnover cap."

