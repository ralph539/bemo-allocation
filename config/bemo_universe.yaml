# Bemo Europe - canonical universe, the bridge from models/Bemo_Allocation_Models_4Tiers.xlsx
# (Bemo 4-Tier sheet) to code. Weights are % of portfolio, each tier sums to 100.
# fx: native = EUR-quoted; traded = EUR-quoted line of a non-EUR index (unhedged);
#     unhedged = non-EUR quote, converted to EUR via ECB rate; hedged = EUR-hedged share class.
base_currency: EUR
start: "2008-01-01"

sleeves:
  - name: Equity - Europe (home)
    bucket: Equity
    proxy: IMEU.AS
    quote_ccy: EUR
    fx: native
    ucits_example: iShares Core MSCI Europe UCITS ETF EUR (Dist)
    weights: {conservative: 9, balanced: 14, growth: 18, aggressive: 20}

  - name: Equity - US
    bucket: Equity
    proxy: SXR8.DE
    quote_ccy: EUR
    fx: traded
    ucits_example: iShares Core S&P 500 UCITS ETF (Acc), Xetra EUR line
    weights: {conservative: 10, balanced: 18, growth: 26, aggressive: 32}

  - name: Equity - Developed Asia-Pacific / Japan
    bucket: Equity
    proxy: SJPA.L
    quote_ccy: GBp
    fx: unhedged
    ucits_example: iShares Core MSCI Japan IMI UCITS ETF USD (Acc)
    weights: {conservative: 4, balanced: 8, growth: 12, aggressive: 13}

  - name: Equity - Emerging / Asia
    bucket: Equity
    proxy: IS3N.DE
    quote_ccy: EUR
    fx: traded
    ucits_example: iShares Core MSCI EM IMI UCITS ETF (Acc)
    weights: {conservative: 3, balanced: 8, growth: 9, aggressive: 11}

  - name: Equity - Thematic AI / automation
    bucket: Equity
    proxy: XAIX.DE
    quote_ccy: EUR
    fx: traded
    ucits_example: Xtrackers Artificial Intelligence & Big Data UCITS ETF 1C
    weights: {conservative: 2, balanced: 4, growth: 5, aggressive: 6}

  - name: Fixed income - EUR Govt / core
    bucket: Fixed income
    proxy: IEGA.AS
    quote_ccy: EUR
    fx: native
    ucits_example: iShares Core Euro Govt Bond UCITS ETF EUR (Dist)
    weights: {conservative: 34, balanced: 15, growth: 9, aggressive: 3}

  - name: Fixed income - EUR IG credit
    bucket: Fixed income
    proxy: IEAC.AS
    quote_ccy: EUR
    fx: native
    ucits_example: iShares Core Euro Corp Bond UCITS ETF EUR (Dist)
    weights: {conservative: 12, balanced: 9, growth: 5, aggressive: 2}

  - name: Fixed income - Inflation-linked
    bucket: Fixed income
    proxy: IBCI.AS
    quote_ccy: EUR
    fx: native
    ucits_example: iShares Euro Inflation Linked Govt Bond UCITS ETF EUR (Acc)
    weights: {conservative: 6, balanced: 4, growth: 2, aggressive: 1}

  - name: Fixed income - High yield
    bucket: Fixed income
    proxy: IHYG.L
    quote_ccy: EUR
    fx: traded
    ucits_example: iShares Euro High Yield Corp Bond UCITS ETF EUR (Dist)
    weights: {conservative: 4, balanced: 3, growth: 1, aggressive: 0}

  - name: Fixed income - EM debt
    bucket: Fixed income
    proxy: EMBE.L
    quote_ccy: EUR
    fx: hedged
    ucits_example: iShares J.P. Morgan $ EM Bond EUR Hedged UCITS ETF (Dist)
    weights: {conservative: 4, balanced: 3, growth: 1, aggressive: 0}

  - name: Gold
    bucket: Alternatives
    proxy: SGLN.L
    quote_ccy: GBp
    fx: unhedged
    ucits_example: iShares Physical Gold ETC
    weights: {conservative: 3, balanced: 4, growth: 4, aggressive: 5}

  - name: Liquid alternatives / hedge funds
    bucket: Alternatives
    proxy: DBMF
    quote_ccy: USD
    fx: unhedged
    ucits_example: iMGP DBi Managed Futures (US proxy; no clean EUR UCITS)
    weights: {conservative: 3, balanced: 4, growth: 3, aggressive: 2}

  - name: Real assets / REITs / infrastructure
    bucket: Alternatives
    proxy: INFR.L
    quote_ccy: GBp
    fx: unhedged
    ucits_example: iShares Global Infrastructure UCITS ETF USD (Dist)
    weights: {conservative: 3, balanced: 4, growth: 3, aggressive: 3}

  - name: Private markets
    bucket: Alternatives
    proxy: null   # 0 in every tier; excluded from the data pull
    quote_ccy: null
    fx: none
    ucits_example: ELTIF / evergreen, large mandates only
    weights: {conservative: 0, balanced: 0, growth: 0, aggressive: 0}

  - name: Cash / EUR money market
    bucket: Cash
    proxy: XEON.DE
    quote_ccy: EUR
    fx: native
    ucits_example: Xtrackers II EUR Overnight Rate Swap UCITS ETF (ESTR)
    weights: {conservative: 3, balanced: 2, growth: 2, aggressive: 2}

# Caps and guardrails, mirroring the xlsx "CAPS & GUARDRAILS" block.
caps:
  regulatory_ucits:
    diversification_5_10_40: "Max 10% NAV per issuer; sum of holdings >5% must not exceed 40% NAV. Govt/public exempt to 35% (or 100% across >=6 issues)."
    counterparty: "<=20% NAV deposits with one body; OTC-derivative counterparty <=10% (credit institution) / 5% (other)."
    eligible_assets: "Transferable securities, MMIs and eligible UCIs only. No direct physical commodities; gold via ETC (debt security)."
    liquidity: "Daily-liquid listed instruments; illiquid/private assets excluded from the UCITS wrapper."
  equity_band:   # equity share is the tier's primary cap
    conservative: [0, 30]
    balanced: [50, 55]
    growth: [68, 75]
    aggressive: [82, 92]
  em_equity_max_pct_of_equity: [10, 20]
  hy_plus_em_debt:
    lower_tiers_max: 8      # combined, ~6-8% in lower tiers
    aggressive_core: 0
  gold_pct: [3, 5]
  thematic_ai_max_pct_of_equity: [5, 10]
  private_markets_standard_model: 0
  tactical_band_pct: [5, 10]     # +/- drift per sleeve around strategic weight
  tail_risk: "Per-tier ceiling on 95% CVaR and max drawdown, enforced as an optimiser constraint."
  rebalancing: "Tolerance-band trigger plus a turnover cap."

# Strategic weight variants. Chosen from the peer survey and the house rules,
# never fitted to backtest performance. sleeves[].weights above is the house variant.
# equity_band keeps each tier's house offsets relative to its own equity total.
